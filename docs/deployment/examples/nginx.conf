# Nginx設定ファイル - シフト管理アプリケーション
# パス: /etc/nginx/sites-available/shift-app

# HTTPサーバー（HTTPSへリダイレクト）
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Let's Encryptの証明書検証用
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTPSへリダイレクト
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPSサーバー（メインの設定）
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # SSL証明書の設定（Let's Encrypt）
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL設定（Mozilla推奨の中間設定）
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;

    # SSL セッションキャッシュ
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/your-domain.com/chain.pem;

    # DNSリゾルバ
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # セキュリティヘッダー
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # アクセスログとエラーログ
    access_log /var/log/nginx/shift-app-access.log;
    error_log /var/log/nginx/shift-app-error.log;

    # 最大アップロードサイズ
    client_max_body_size 10M;

    # Gzip圧縮
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # リバースプロキシ設定（Node.jsアプリケーション）
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocketサポート
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # プロキシヘッダー
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # キャッシュ制御
        proxy_cache_bypass $http_upgrade;

        # タイムアウト設定
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 静的ファイルのキャッシュ設定
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # キャッシュヘッダー
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Gzip圧縮
        gzip_static on;
    }

    # ヘルスチェックエンドポイント
    location /api/health {
        proxy_pass http://localhost:3000/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;

        # ログに記録しない
        access_log off;
    }

    # robots.txtの配信
    location = /robots.txt {
        proxy_pass http://localhost:3000/robots.txt;
        access_log off;
    }

    # faviconの配信
    location = /favicon.ico {
        proxy_pass http://localhost:3000/favicon.ico;
        access_log off;
    }
}

# 設定のテスト:
#   sudo nginx -t
#
# Nginxのリロード:
#   sudo systemctl reload nginx
#
# SSL証明書の取得（初回のみ）:
#   sudo certbot --nginx -d your-domain.com
#
# SSL証明書の自動更新設定:
#   sudo certbot renew --dry-run
