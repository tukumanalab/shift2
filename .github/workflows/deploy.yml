name: Deploy to VPS

on:
  workflow_dispatch:  # 手動実行のみ（一時的に無効化）
  # push:
  #   branches:
  #     - main

env:
  NODE_VERSION: '20.x'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      #################################################
      # 1. リポジトリのチェックアウト
      #################################################
      - name: Checkout code
        uses: actions/checkout@v4

      #################################################
      # 2. Node.jsのセットアップ
      #################################################
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      #################################################
      # 3. 依存関係のインストール
      #################################################
      - name: Install dependencies
        run: npm ci

      #################################################
      # 4. テストの実行
      #################################################
      - name: Run tests
        run: npm run test:coverage
        continue-on-error: false

      #################################################
      # 5. TypeScriptビルド
      #################################################
      - name: Build TypeScript
        run: npm run build

      #################################################
      # 6. デプロイアーカイブの作成
      #################################################
      - name: Create deployment archive
        run: |
          mkdir -p deploy

          # 必要なファイルをコピー
          cp -r dist deploy/
          cp -r node_modules deploy/
          cp package.json deploy/
          cp package-lock.json deploy/
          cp ecosystem.config.js deploy/

          # フロントエンドの静的ファイルをコピー
          cp index.html deploy/
          cp app.js deploy/ 2>/dev/null || true
          cp -r js deploy/
          cp -r styles deploy/ 2>/dev/null || true
          cp -r assets deploy/ 2>/dev/null || true
          cp -r public deploy/ 2>/dev/null || true

          # アーカイブ作成
          cd deploy
          tar -czf ../deploy.tar.gz .
          cd ..

          echo "Deployment archive created: deploy.tar.gz"
          ls -lh deploy.tar.gz

      #################################################
      # 7. VPS上のディレクトリ準備
      #################################################
      - name: Prepare VPS directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          script: |
            sudo mkdir -p /srv/shift2
            sudo chown -R $USER:www-data /srv/shift2
            sudo chmod 775 /srv/shift2

      #################################################
      # 8. VPSへの転送（SCP）
      #################################################
      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          source: "deploy.tar.gz"
          target: "/srv/shift2/"

      #################################################
      # 9. VPSでデプロイスクリプト実行
      #################################################
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_URL: ${{ vars.APP_URL }}
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          envs: APP_URL
          script: |
            cd /srv/shift2
            chmod +x deploy.sh
            ./deploy.sh

      #################################################
      # 10. デプロイ後のヘルスチェック
      #################################################
      - name: Health check
        run: |
          echo "Waiting for application to start..."
          sleep 10

          MAX_ATTEMPTS=10
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            if curl -sf "${{ vars.APP_URL }}/api/health" > /dev/null; then
              echo "Health check passed!"
              exit 0
            else
              ATTEMPT=$((ATTEMPT + 1))
              echo "Health check failed (attempt $ATTEMPT/$MAX_ATTEMPTS)"
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "Retrying in 5 seconds..."
                sleep 5
              fi
            fi
          done

          echo "Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

      #################################################
      # 11. デプロイ完了通知（オプション）
      #################################################
      - name: Deployment success
        if: success()
        run: |
          echo "========================================="
          echo "Deployment successful!"
          echo "========================================="
          echo "Application URL: ${{ vars.APP_URL }}"
          echo "Deployed at: $(date)"

      - name: Deployment failed
        if: failure()
        run: |
          echo "========================================="
          echo "Deployment failed!"
          echo "========================================="
          echo "Please check the logs and rollback if necessary:"
          echo "  ssh ${{ vars.VPS_USERNAME }}@${{ vars.VPS_HOST }}"
          echo "  cd /srv/shift2 && ./rollback.sh"
