name: SSH Connection Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ssh-test:
    runs-on: ubuntu-latest

    steps:
      - name: Test SSH connection to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.VPS_HOST }}
          username: ${{ vars.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ vars.VPS_PORT }}
          script: |
            echo "========================================="
            echo "SSH Connection Test"
            echo "========================================="
            echo ""
            echo "Current user:"
            whoami
            echo ""
            echo "Current directory:"
            pwd
            echo ""
            echo "Home directory contents:"
            ls -la ~
            echo ""
            echo "/srv/shift2 directory:"
            ls -la /srv/shift2 2>/dev/null || echo "/srv/shift2 does not exist or no permission"
            echo ""
            echo "Disk space:"
            df -h
            echo ""
            echo "System info:"
            uname -a
            echo ""
            echo "========================================="
            echo "SSH Connection Test Completed Successfully!"
            echo "========================================="
